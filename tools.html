<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools - Walter Creations</title>
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="global.css">
  <!-- Page Specific Styles -->
  <link rel="stylesheet" href="tools.css">

</head>

<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Tools Page Content -->
  <main class="tools-page">
    <h1>Our Tools</h1>
    <p>Explore our collection of creative tools and generators. Click a tool to try it out!</p>

    <div class="tools-container" id="tools-container">
      <!-- Tools will be dynamically loaded here -->
    </div>

<input
  type="text"
  id="tool-search"
  placeholder="Search tools..."
  style="max-width:400px; padding:10px; margin:30px auto; display:block;"
>

    <!-- External Tool Library -->
    <h2 style="margin-top: 60px;">Other Cool Tools Around the Web</h2>
    <p>Here’s a curated selection of powerful creative tools made by other amazing developers.</p>

    <div class="tools-container" id="other-tools-container">
      <!-- External tools are generated here -->
    </div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Global JS (navbar + footer + dark mode) -->
  <script src="global.js"></script>
  <!-- Fetch Tools List -->
  <script src='tools.js'></script>
  </script>

</body>
</html>
